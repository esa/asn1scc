name: LSP artifacts

# Builds the editor-ready Language Server artifacts so users do not have to build
# them locally:
#   * the VSCode extension (.vsix) — no npm/Node needed on the user's machine
#   * self-contained language servers for win-x64 and linux-x64 — no .NET install needed
#
# Every run uploads them as downloadable build artifacts. When a version tag (v*) is
# pushed, they are also attached to the corresponding GitHub Release.

on:
  push:
    branches: [ master ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write   # needed to attach assets to a GitHub Release on tags

jobs:
  build-lsp-artifacts:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 10 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # asn1scc generates some source code at build time using two helper tools.
      # They must be built first (in the same configuration), otherwise the main
      # build fails with "... parseStg2.dll ... exited with code 1".
      - name: Build code generators (Antlr, parseStg2)
        run: |
          dotnet build Antlr/ -c Release
          dotnet build parseStg2/ -c Release

      # ---- VSCode extension (.vsix) ----
      - name: Build & package the VSCode extension
        working-directory: lsp/Client
        run: |
          npm install
          npm run compile
          npm run package

      # ---- Self-contained language server binaries ----
      - name: Publish language server (win-x64, self-contained)
        run: dotnet publish lsp/Server/Server/Server.csproj -c Release -r win-x64 --self-contained true -o publish/win-x64

      - name: Publish language server (linux-x64, self-contained)
        run: dotnet publish lsp/Server/Server/Server.csproj -c Release -r linux-x64 --self-contained true -o publish/linux-x64

      - name: Zip server binaries
        run: |
          cd publish
          zip -qr ../asn1scc-lsp-server-win-x64.zip win-x64
          zip -qr ../asn1scc-lsp-server-linux-x64.zip linux-x64

      # ---- Upload as build artifacts (every run) ----
      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asn1scc-lsp
          path: |
            lsp/Client/*.vsix
            asn1scc-lsp-server-win-x64.zip
            asn1scc-lsp-server-linux-x64.zip
          if-no-files-found: error

      # ---- Attach to the GitHub Release (tags only) ----
      - name: Attach artifacts to the GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          assets=(lsp/Client/*.vsix asn1scc-lsp-server-win-x64.zip asn1scc-lsp-server-linux-x64.zip)
          if gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1; then
            gh release upload "$GITHUB_REF_NAME" "${assets[@]}" --clobber
          else
            gh release create "$GITHUB_REF_NAME" "${assets[@]}" --title "$GITHUB_REF_NAME" --generate-notes
          fi
